name: DR Readiness Check (Manual)

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  dr-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      # AWS authentication (OIDC)
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::123456789012:role/GitHubActionsRole
          aws-region: us-east-1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install DR tool
        run: |
          python -m pip install --upgrade pip
          pip install git+https://github.com/QaysAlnajjad/dr-tool.git

      # Optional: إذا عندك script جاهز يولد config
      - name: Generate DR config
        run: |
          ./scripts/generate-dr-config.sh config.yaml dr-config.yaml

      # Optional: إذا تريد جلب image URIs من runtime
      - name: Load image URIs
        run: |
          echo "PRIMARY_ECR_IMAGE_URI=$(cat scripts/runtime/primary-ecr-image-uri || echo '')" >> $GITHUB_ENV
          echo "DR_ECR_IMAGE_URI=$(cat scripts/runtime/dr-ecr-image-uri || echo '')" >> $GITHUB_ENV

      - name: Run DR checker
        run: |
          dr-checker \
            --config dr-config.yaml \
            --primary-image-uri "$PRIMARY_ECR_IMAGE_URI" \
            --dr-image-uri "$DR_ECR_IMAGE_URI"
